<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Skener postaje</title>
<script src="https://unpkg.com/html5-qrcode@2.3.10/html5-qrcode.min.js"></script>
<style>
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; padding: 12px; }
  .container { max-width: 520px; margin: 0 auto; }
  input { font-size: 20px; padding: 10px; width: 100%; box-sizing: border-box; }
  .row { display: flex; gap: 8px; align-items: center; }
  .badge { padding: 4px 8px; border-radius: 6px; background: #eef; color: #223; font-size: 12px; }
  button { padding: 8px 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; background: #fafafa; cursor: pointer; }
  button:disabled { background: #eee; color: #999; cursor: not-allowed; }
  #log { margin-top: 12px; font-size: 14px; color: #0a7a27; }
  #err { margin-top: 12px; font-size: 14px; color: #b00020; }
  label { font-size: 14px; color: #444; }
  select { padding: 6px; font-size: 14px; }
  #reader { width: min(420px, 95vw); height: 33vh; max-height: 320px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: #000; }
  #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
  #nativeHint { padding: 10px; color: #ddd; font-size: 13px; line-height: 1.3; }
  .topbar { display:flex; gap:8px; align-items:center; }
  .topbar select { flex:1; min-width: 0; }
  .muted { color:#666; font-size:12px; }
</style>
<div class="container">
<h2 style="margin:0 0 10px 0;">Skener postaje</h2>
<div class="topbar">
    <select id="sel" aria-label="Postaja">
      <option>Tisk</option>
      <option>Plastifikacija</option>
      <option>UV Tisk</option>
      <option>UV Lak</option>
      <option>Izsek/Zasek</option>
      <option>Razrez</option>
      <option>Topli tisk</option>
      <option>Biganje</option>
      <option>Biganje + ročno zgibanje</option>
      <option>Zgibanje</option>
      <option>Lepljenje</option>
      <option>Lepljenje blokov</option>
      <option>Vezava</option>
      <option>Vrtanje luknje</option>
      <option>Perforacija</option>
      <option>Dodatno</option>
      <option>Kooperanti</option>
    </select>
  <button id="saveStep">Shrani kot privzeto</button>
</div>

<div style="margin-top:12px;">
  <div id="reader">
    <video id="nativeVideo" style="display:none;" autoplay playsinline muted></video>
    <div id="nativeHint">
      Če kamera ne deluje: preveri dovoljenja (Camera: Allow). Če naprava nima interneta, se knjižnica za QR morda ne naloži; v tem primeru bo uporabljen “native” skener (če ga brskalnik podpira).
    </div>
  </div>

  <!-- kamera izbira: skrito (uporabno za debug/edge primere) -->
  <select id="camSel" style="display:none;"></select>

  <div class="row" style="margin-top:8px;">
    <button id="startCam" style="flex:1;">Zaženi kamero</button>
    <button id="stopCam" style="flex:1;">Ustavi kamero</button>
  </div>

  <div style="margin-top:10px;">
    <label for="inp">Vnos (številka ali številka + tekst):</label>
    <input id="inp" placeholder="npr. 65001 ali 65001 Vizitke" />
  </div>

  <div class="row" style="margin-top:8px;">
    <button id="send" disabled style="flex:1;">Pošlji</button>
    <button id="clear" style="flex:1;">Počisti vnos</button>
  </div>

  <div id="log" class="muted"></div>
  <div id="err"></div>
  <div id="last" class="muted"></div>
</div>

<h3 style="margin-top:16px;">Zadnji skeni</h3>
<div id="scanLog" style="border:1px solid #ddd; padding:8px; border-radius:6px; max-height: 300px; overflow:auto;"></div>

<script>
  // (ura skrita – namenoma minimalno za telefon)
</script>

<script>
  // Vedno kliči relativne /api poti:
  // - v dev: Vite proxy-ja /api -> http://localhost:5000
  // - v prod: backend že servira /api na istem originu
  (async () => {
  const params = new URLSearchParams(location.search);
  const storedStep = localStorage.getItem('scanStep') || '';
  const stepFromUrl = params.get('step');
  const token = params.get('token') || '';
  const sel = document.getElementById('sel');
  if (stepFromUrl) sel.value = stepFromUrl;
  else if (storedStep) sel.value = storedStep;
  sel.addEventListener('change', () => {});
  document.getElementById('saveStep').addEventListener('click', () => {
    localStorage.setItem('scanStep', sel.value);
    document.getElementById('log').textContent = 'Shranjeno.';
    setTimeout(() => document.getElementById('log').textContent = '', 900);
  });

  const inp = document.getElementById('inp');
  const sendBtn = document.getElementById('send');
  const clearBtn = document.getElementById('clear');
  const logEl = document.getElementById('log');
  const errEl = document.getElementById('err');
  const lastEl = document.getElementById('last');
  const scanLogEl = document.getElementById('scanLog');

  // Kratek "pip" ob uspešnem pošiljanju (audio pogosto zahteva user gesture – prvi klik na kamero/pošlji to omogoči)
  let __audioCtx = null;
  function beep() {
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      if (!__audioCtx) __audioCtx = new Ctx();
      if (__audioCtx.state === 'suspended') __audioCtx.resume();
      const o = __audioCtx.createOscillator();
      const g = __audioCtx.createGain();
      o.type = 'sine';
      o.frequency.value = 880;
      g.gain.value = 0.08;
      o.connect(g);
      g.connect(__audioCtx.destination);
      o.start();
      setTimeout(() => { try { o.stop(); } catch {} }, 90);
    } catch {}
  }

  const enableSend = () => {
    sendBtn.disabled = !/(\d{3,})/.test(inp.value.trim());
  };
  inp.addEventListener('input', enableSend);
  enableSend();
  clearBtn.addEventListener('click', () => { inp.value=''; enableSend(); inp.focus(); });

  const subjectCache = {
    loaded: false,
    map: new Map(), // nalog -> { p1, p2, p1n, p2n }
    loadingPromise: null,
  };

  function normalizeSubject(s) {
    return String(s || '')
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '') // remove diacritics
      .replace(/[^a-z0-9]+/g, ' ')
      .trim();
  }

  async function ensureSubjectsLoaded() {
    if (subjectCache.loaded) return;
    if (subjectCache.loadingPromise) return subjectCache.loadingPromise;
    subjectCache.loadingPromise = (async () => {
      try {
        const res = await fetch('/api/delovni-nalogi', { headers: { 'Accept': 'application/json' } });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const list = Array.isArray(data) ? data : (data && Array.isArray(data.nalogi) ? data.nalogi : []);
        subjectCache.map.clear();
        for (const n of list) {
          const st = Number(n?.stevilkaNaloga || n?.StevilkaNaloga || n?.id || n?.ID || 0);
          if (!st) continue;
          const p1 = (n?.Predmet1 || n?.predmet1 || '').toString();
          const p2 = (n?.Predmet2 || n?.predmet2 || '').toString();
          subjectCache.map.set(st, { p1, p2, p1n: normalizeSubject(p1), p2n: normalizeSubject(p2) });
        }
        subjectCache.loaded = true;
      } catch {
        // ignore, we will fallback to default part
      }
    })();
    return subjectCache.loadingPromise;
  }

  function detectPartFromText(nalogNumber, rawText) {
    const fallback = 1; // if we can't detect, default to Predmet 1
    const textN = normalizeSubject(rawText);
    if (!textN) return fallback;
    const entry = subjectCache.map.get(Number(nalogNumber));
    if (!entry) return fallback;
    if (entry.p1n && textN.includes(entry.p1n)) return 1;
    if (entry.p2n && textN.includes(entry.p2n)) return 2;
    return fallback;
  }

  function parseNalogFromText(text) {
    const m = String(text || '').match(/(\d{3,})/);
    return m ? m[1] : null;
  }

  async function submit({ via, rawText } = { via: 'manual', rawText: null }) {
    const inputText = (rawText != null ? String(rawText) : inp.value);
    const nalog = parseNalogFromText(inputText);
    if (!nalog) return;
    // Anti-double-scan debounce (kamera pogosto sproži isti QR večkrat zapored)
    const now = Date.now();
    if (window.__lastScan && window.__lastScan.nalog === nalog && (now - window.__lastScan.ts) < 1500) {
      return;
    }
    window.__lastScan = { nalog, ts: now };
    errEl.textContent = '';
    logEl.textContent = '';
    try {
      await ensureSubjectsLoaded();
      const part = detectPartFromText(nalog, inputText);
      const res = await fetch('/api/scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nalog: Number(nalog), step: sel.value, token, part })
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      beep();
      logEl.textContent = `✓ Poslano (${via}): #${nalog} – ${sel.value} (P${part})`;
      lastEl.textContent = '';
      // takoj prikaži v logu (UI feedback), SSE/GET bo potem uskladil stanje
      try {
        const local = JSON.parse(localStorage.getItem('scanLogLocal') || '[]');
        local.unshift({ nalog: Number(nalog), step: sel.value, ts: Date.now(), action: 'scan', part });
        localStorage.setItem('scanLogLocal', JSON.stringify(local.slice(0, 10)));
      } catch {}
      inp.value = '';
      enableSend();
    } catch (e) {
      errEl.textContent = 'Napaka pri pošiljanju.';
    }
  }
  sendBtn.addEventListener('click', () => submit({ via: 'manual' }));

  // QR kamera z html5-qrcode
  const startCamBtn = document.getElementById('startCam');
  const stopCamBtn = document.getElementById('stopCam');
  const camSel = document.getElementById('camSel');
  const nativeHint = document.getElementById('nativeHint');
  let html5Qrcode = null;
  let nativeStream = null;
  let nativeRunning = false;
  let nativeTimer = null;

  function getOrCreateNativeVideo() {
    let v = document.getElementById('nativeVideo');
    if (!v) {
      v = document.createElement('video');
      v.id = 'nativeVideo';
      v.autoplay = true;
      v.muted = true;
      v.setAttribute('playsinline', '');
      v.style.display = 'none';
      document.getElementById('reader').appendChild(v);
    }
    return v;
  }

  async function stopNative() {
    nativeRunning = false;
    if (nativeTimer) {
      clearTimeout(nativeTimer);
      nativeTimer = null;
    }
    const v = document.getElementById('nativeVideo');
    if (v) {
      try { v.pause(); } catch {}
      v.srcObject = null;
      v.style.display = 'none';
    }
    if (nativeStream) {
      try { nativeStream.getTracks().forEach(t => t.stop()); } catch {}
      nativeStream = null;
    }
  }

  async function startNative({ deviceId } = {}) {
    if (!navigator.mediaDevices?.getUserMedia) {
      throw new Error('Brskalnik ne podpira getUserMedia().');
    }
    if (!('BarcodeDetector' in window)) {
      throw new Error('Brskalnik ne podpira BarcodeDetector (QR). Poskusi Chrome na Androidu ali uporabi ročni vnos.');
    }
    await stopNative();
    const constraints = {
      video: deviceId
        ? { deviceId: { exact: deviceId } }
        : { facingMode: { ideal: 'environment' } }
    };
    nativeStream = await navigator.mediaDevices.getUserMedia(constraints);
    const v = getOrCreateNativeVideo();
    v.srcObject = nativeStream;
    v.style.display = 'block';
    if (nativeHint) nativeHint.style.display = 'none';
    await v.play();
    const detector = new BarcodeDetector({ formats: ['qr_code'] });
    nativeRunning = true;

    const tick = async () => {
      if (!nativeRunning) return;
      try {
        const codes = await detector.detect(v);
        if (Array.isArray(codes) && codes.length > 0) {
          const raw = codes[0].rawValue || codes[0].value || '';
          await onScanSuccess(String(raw));
        }
      } catch {
        // ignore scan errors (npr. frame not ready)
      }
      nativeTimer = setTimeout(tick, 200);
    };
    tick();
  }

  async function ensureCameraList() {
    try {
      camSel.innerHTML = '';
      // Prefer html5-qrcode list if available (usually has better labels)
      if (window.Html5Qrcode && window.Html5Qrcode.getCameras) {
        const cams = await window.Html5Qrcode.getCameras();
        if (Array.isArray(cams) && cams.length > 0) {
          for (const c of cams) {
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = c.label || `Camera ${c.id}`;
            camSel.appendChild(opt);
          }
          if (cams.length > 1) camSel.value = cams[cams.length - 1].id;
          return;
        }
      }
      // Fallback: enumerateDevices (labels can be empty until permission granted)
      if (navigator.mediaDevices?.enumerateDevices) {
        const devs = await navigator.mediaDevices.enumerateDevices();
        const cams = (devs || []).filter(d => d.kind === 'videoinput');
        for (const c of cams) {
          const opt = document.createElement('option');
          opt.value = c.deviceId;
          opt.textContent = c.label || 'Camera';
          camSel.appendChild(opt);
        }
        if (cams.length > 1) camSel.selectedIndex = cams.length - 1;
      }
    } catch {}
  }
  await ensureCameraList();

  async function onScanSuccess(decodedText) {
    const num = parseNalogFromText(decodedText);
    if (!num) {
      errEl.textContent = 'QR ne vsebuje številke naloga.';
      return;
    }
    // Ne izgubi “predmet” dela QR kode (npr. 67110_Vizitke 1) – številko naloga vseeno izluščimo ob pošiljanju
    inp.value = String(decodedText || '').trim() || num;
    enableSend();
    await submit({ via: 'camera', rawText: decodedText });
  }
  startCamBtn.addEventListener('click', async () => {
    try {
      if (!window.isSecureContext && location.hostname !== 'localhost') {
        errEl.textContent = 'Kamera na telefonu pogosto deluje samo na HTTPS (ali localhost). Odpri HTTPS ali uporabi ročni vnos.';
        return;
      }
      await ensureCameraList();
      const selectedCamId = camSel && camSel.value ? camSel.value : null;
      // Prefer Html5Qrcode if library loaded (best compatibility). If not, use native BarcodeDetector fallback.
      if (window.Html5Qrcode) {
        if (!html5Qrcode) html5Qrcode = new Html5Qrcode('reader');
        await stopNative();
        if (nativeHint) nativeHint.style.display = '';
        await html5Qrcode.start(
          selectedCamId ? { deviceId: { exact: selectedCamId } } : { facingMode: 'environment' },
          { fps: 10, qrbox: { width: 220, height: 220 } },
          onScanSuccess
        );
        logEl.textContent = 'Kamera zagnana (Html5Qrcode).';
      } else {
        // unpkg (internet) might be blocked/offline on shop-floor phones; native fallback doesn't require external libs
        await startNative({ deviceId: selectedCamId || undefined });
        logEl.textContent = 'Kamera zagnana (native).';
      }
    } catch (e) {
      const name = (e && typeof e === 'object' && 'name' in e) ? String(e.name) : '';
      const msg = (e && typeof e === 'object' && 'message' in e) ? String(e.message) : String(e || '');
      // Najpogostejši primeri:
      // - NotAllowedError: uporabnik ni dovolil kamere ali brskalnik blokira zaradi "Not secure"
      // - NotFoundError: ni kamere
      // - NotReadableError: kamera zasedena v drugi aplikaciji
      errEl.textContent = `Kamera napaka: ${name || 'Error'}${msg ? ` – ${msg}` : ''}. Če naprava nima interneta, se Html5Qrcode (unpkg) ne naloži — uporabi “native” način (če je podprt) ali ročni vnos. Preveri tudi dovoljenja (Camera: Allow) in da je cert zaupanja vreden.`;
    }
  });
  stopCamBtn.addEventListener('click', async () => {
    try {
      if (html5Qrcode) {
        await html5Qrcode.stop();
        await html5Qrcode.clear();
      }
      await stopNative();
      logEl.textContent = 'Kamera ustavljena.';
    } catch (e) {}
  });

  // Zadnji skeni + undo
  function renderLog(items) {
    scanLogEl.innerHTML = '';
    // Prepend lokalni log (instant feedback) – backend log ostane vir resnice
    try {
      const local = JSON.parse(localStorage.getItem('scanLogLocal') || '[]');
      if (Array.isArray(local) && local.length > 0) {
        items = [...local, ...(items || [])].slice(0, 10);
      }
    } catch {}
    (items || []).forEach((it) => {
      const row = document.createElement('div');
      row.style.padding = '6px 4px';
      row.style.borderBottom = '1px solid #eee';
      const t = new Date(it.ts || Date.now());
      const hh = String(t.getHours()).padStart(2,'0');
      const mm = String(t.getMinutes()).padStart(2,'0');
      const ss = String(t.getSeconds()).padStart(2,'0');
      const partLabel = (it && (it.part === 1 || it.part === 2)) ? ` <span class="badge">P${it.part}</span>` : '';
      row.innerHTML = `
        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
          <span class="badge">${hh}:${mm}:${ss}</span>
          <span>${it.action === 'undo' ? '⤺ UNDO' : '✓ SCAN'}</span>
          <strong>#${it.nalog}</strong>
          <span>${it.step}</span>
          ${partLabel}
          ${it.action === 'scan' ? `<button data-nalog="${it.nalog}" data-step="${it.step}" data-part="${it.part ?? ''}">Razveljavi</button><span class="muted" data-sent style="display:none;">Poslano.</span>` : ''}
        </div>
      `;
      const btn = row.querySelector('button');
      const sent = row.querySelector('[data-sent]');
      if (btn) btn.addEventListener('click', async () => {
        try {
          if (btn) btn.disabled = true;
          const part = btn.dataset.part ? Number(btn.dataset.part) : undefined;
          const res = await fetch('/api/scan-undo', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nalog: Number(btn.dataset.nalog), step: btn.dataset.step, token, part: Number.isFinite(part) ? part : undefined })
          });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          try { beep(); } catch {}
          if (sent) sent.style.display = '';
          setTimeout(() => { try { if (sent) sent.style.display = 'none'; } catch {} }, 1200);
        } catch (e) {
          alert('Preklic ni uspel.');
        } finally {
          if (btn) btn.disabled = false;
        }
      });
      scanLogEl.appendChild(row);
    });
  }
  async function loadLog() {
    try {
      const res = await fetch('/api/scan-log');
      if (!res.ok) return;
      const data = await res.json();
      renderLog(data);
    } catch {}
  }
  await loadLog();
  try {
    const es = new EventSource('/api/scan-events');
    es.onmessage = (e) => {
      try {
        loadLog();
      } catch {}
    };
  } catch {}
  })();
</script>

<!-- container end -->
</div>
